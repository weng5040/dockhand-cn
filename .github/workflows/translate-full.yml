# ============================================================
# Workflow: 全量翻译（一次性手动触发）
# 功能: 翻译 src/ 下所有 .svelte 文件的英文界面文本为中文
# 引擎: OpenAI 兼容接口（可接任意兴趣服务）
#
# 需要在仓库 Settings → Secrets → Actions 中添加：
#   AI_API_KEY   = 你的 API Key
#   AI_BASE_URL  = API 基础地址（不含 /v1）
#   AI_MODEL     = 模型名称
# ============================================================

name: 全量翻译（手动触发）

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '试运行（仅打印计划翻译的内容，不修改文件）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 zh-CN 分支
        uses: actions/checkout@v5
        with:
          ref: zh-CN
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Python 依赖
        run: pip install openai

      - name: 执行全量翻译
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          cat << 'PYEOF' > /tmp/translate_full.py
          import os, re, sys, json
          from openai import OpenAI

          api_key  = os.environ['AI_API_KEY']
          base_url = os.environ['AI_BASE_URL'].rstrip('/') + '/v1'
          model    = os.environ['AI_MODEL']
          dry_run  = os.environ.get('DRY_RUN', 'false').lower() == 'true'

          client = OpenAI(api_key=api_key, base_url=base_url)

          SYSTEM_PROMPT = """你是一个专业的 Docker 管理面板汉化专家。
          任务：将 Svelte 组件模板中的英文界面文本翻译成中文。
          规则：
          1. 只翻译可见的 UI 文本（按钮、标签、标题、提示语等）
          2. 保留所有 HTML 标签、Svelte 语法（{#if} {#each} {@render} 等）、变量插值 {variable} 原封不动
          3. 技术术语参考：Container→容器、Stack→应用栈、Volume→数据卷、Network→网络、Image→镜像、Registry→镜像仓库、Dashboard→仪表盘、Environment→环境、Schedule→定时任务、Audit→审计、Terminal→终端
          4. 直接返回翻译后的完整文件内容，不要加任何解释或代码块标记"""

          # 跳过已手动翻译的文件
          SKIP_FILES = {'src/routes/+layout.svelte'}

          # 收集所有需要翻译的 .svelte 文件
          svelte_files = []
          for root, dirs, files in os.walk('src'):
              dirs[:] = [d for d in dirs if d not in ['node_modules', '.svelte-kit']]
              if 'components/ui' in root:
                  continue
              for f in files:
                  if f.endswith('.svelte'):
                      path = os.path.join(root, f)
                      if path not in SKIP_FILES:
                          svelte_files.append(path)

          print(f'找到 {len(svelte_files)} 个 .svelte 文件')

          # 快速检查文件是否含英文文本（避免翻译纯逻辑文件）
          EN_TEXT_RE = re.compile(r'>\s*[A-Z][a-zA-Z\s]{3,}[a-zA-Z]\s*[<{]')

          translated_count = 0
          for filepath in sorted(svelte_files):
              with open(filepath, encoding='utf-8') as f:
                  content = f.read()

              # 没有英文 UI 文本则跳过
              if not EN_TEXT_RE.search(content):
                  print(f'  ✓ 跳过（无英文文本）: {filepath}')
                  continue

              print(f'  → 翻译: {filepath}')
              if dry_run:
                  continue

              try:
                  resp = client.chat.completions.create(
                      model=model,
                      messages=[
                          {'role': 'system', 'content': SYSTEM_PROMPT},
                          {'role': 'user', 'content': f'请翻译以下 Svelte 文件：\n\n{content}'}
                      ],
                      temperature=0.1,
                  )
                  translated = resp.choices[0].message.content.strip()

                  # 去掉模型可能加的 markdown 代码块
                  translated = re.sub(r'^```[\w]*\n?', '', translated)
                  translated = re.sub(r'\n?```$', '', translated)

                  if translated and translated != content:
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(translated)
                      translated_count += 1
                      print(f'     ✅ 已翻译')
                  else:
                      print(f'     ⚠️  内容未变化，跳过')

              except Exception as e:
                  print(f'     ❌ 翻译失败: {e}')

          print(f'\n全量翻译完成，共翻译 {translated_count} 个文件')
          PYEOF
          python3 /tmp/translate_full.py

      - name: 提交翻译结果
        if: github.event.inputs.dry_run == 'false'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [AI 翻译]"
          git add -A
          if git diff --cached --quiet; then
            echo "没有文件变更，无需提交"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "i18n: AI 全量汉化 ${COUNT} 个文件 [自动]"
            git push origin zh-CN
            echo "✅ 已提交并推送"
          fi
