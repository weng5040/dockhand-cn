name: Translate Full (Manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: print plan only, no file changes'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zh-CN
        uses: actions/checkout@v4
        with:
          ref: zh-CN
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install openai

      - name: Write translate script
        run: |
          python3 -c "import base64; open('/tmp/translate_full.py','w').write(base64.b64decode('').decode())"
          echo "Script written."

      - name: Run translate script
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python3 /tmp/translate_full.py

      - name: Commit results
        if: github.event.inputs.dry_run == 'false'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [i18n]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "i18n: auto translate ${COUNT} files [bot]"
            git push origin zh-CN
            echo "Done."
          fi
