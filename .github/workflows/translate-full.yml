name: Translate Full (Manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: print plan only, no file changes'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zh-CN
        uses: actions/checkout@v4
        with:
          ref: zh-CN
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install openai

      - name: Write translate script
        run: |
          python3 - <<'PYEOF'
          import os
          script = r"""
          import os, re, sys
          from openai import OpenAI

          api_key  = os.environ.get('AI_API_KEY', '')
          base_url = os.environ.get('AI_BASE_URL', '').rstrip('/') + '/v1'
          model    = os.environ.get('AI_MODEL', '')
          dry_run  = os.environ.get('DRY_RUN', 'false').lower() == 'true'

          if not api_key:
              print('ERROR: AI_API_KEY is empty')
              sys.exit(1)

          client = OpenAI(api_key=api_key, base_url=base_url)
          print(f'Model: {model}')

          SYSTEM_PROMPT = (
              'You are a Docker management panel localization expert. '
              'Translate English UI text in Svelte files to Simplified Chinese. '
              'Rules: '
              '1. Only translate visible UI text (buttons, labels, titles, placeholders). '
              '2. Keep ALL HTML tags, Svelte syntax ({#if}{#each}{@render} etc), and {variable} interpolations unchanged. '
              '3. Terms: Container->\u5bb9\u5668, Stack->\u5e94\u7528\u6808, Volume->\u6570\u636e\u5377, Network->\u7f51\u7edc, '
              'Image->\u955c\u50cf, Registry->\u955c\u50cf\u4ed3\u5e93, Dashboard->\u4eea\u8868\u76d8, Environment->\u73af\u5883, '
              'Schedule->\u5b9a\u65f6\u4efb\u52a1, Audit->\u5ba1\u8ba1, Terminal->\u7ec8\u7aef, Deploy->\u90e8\u7f72. '
              '4. Return ONLY the translated file content. No explanations. No markdown fences.'
          )

          SKIP_FILES = {'src/routes/+layout.svelte'}
          # Only scan src/, never touch .github/ or config files
          svelte_files = []
          for root, dirs, files in os.walk('src'):
              dirs[:] = [d for d in dirs if d not in ['node_modules', '.svelte-kit']]
              if 'components/ui' in root:
                  continue
              for f in files:
                  if f.endswith('.svelte'):
                      path = os.path.join(root, f)
                      if path not in SKIP_FILES:
                          svelte_files.append(path)

          print(f'Found {len(svelte_files)} .svelte files')
          EN_TEXT_RE = re.compile(r'>\s*[A-Z][a-zA-Z ]{3,}[a-zA-Z]\s*[<{]')
          count = 0

          for filepath in sorted(svelte_files):
              with open(filepath, encoding='utf-8') as f:
                  content = f.read()
              if not EN_TEXT_RE.search(content):
                  print(f'  skip: {filepath}')
                  continue
              print(f'  -> {filepath}')
              if dry_run:
                  continue
              try:
                  resp = client.chat.completions.create(
                      model=model,
                      messages=[
                          {'role': 'system', 'content': SYSTEM_PROMPT},
                          {'role': 'user', 'content': 'Translate this Svelte file:\n\n' + content}
                      ],
                      temperature=0.1,
                  )
                  out = resp.choices[0].message.content.strip()
                  out = re.sub(r'^```[\w]*\n?', '', out)
                  out = re.sub(r'\n?```$', '', out)
                  if out and out != content:
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(out)
                      count += 1
                      print('     OK')
                  else:
                      print('     no change')
              except Exception as e:
                  print(f'     FAIL: {e}')

          print(f'Done. Translated {count} files.')
          """
          # dedent to remove leading spaces caused by YAML indentation
          import textwrap
          script = textwrap.dedent(script)
          with open('/tmp/translate_full.py', 'w') as f:
              f.write(script)
          print('Script written to /tmp/translate_full.py')
          PYEOF

      - name: Run translate script
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python3 /tmp/translate_full.py

      - name: Commit results
        if: github.event.inputs.dry_run == 'false'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [i18n]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "i18n: auto translate ${COUNT} files [bot]"
            git push origin zh-CN
            echo "Done."
          fi
