# ============================================================
# Workflow 名称：Merge main into zh-CN
# 功能说明：
#   当 main 分支有新推送时（即上游同步完成后），
#   自动将 main 的最新代码合并到 zh-CN 翻译分支。
#   合并策略：以 main 的内容为准（theirs），
#   但强制保留 zh-CN 分支自己的 .github 目录，
#   防止 workflow 文件被上游覆盖。
#
# 触发方式：
#   - 自动：main 分支有 push 时触发
#   - 手动：可在 GitHub Actions 页面手动触发
#
# 注意事项：
#   - 翻译文件（src/ 下）若与上游冲突，会自动以上游为准
#   - 遇到无法自动解决的冲突时，会自动开 Issue 提醒
# ============================================================

name: Merge main into zh-CN

on:
  # main 分支有推送时自动触发（上游同步完成后）
  push:
    branches: [main]
  # 允许在 GitHub Actions 页面手动触发
  workflow_dispatch:

permissions:
  contents: write  # 允许推送代码
  issues: write    # 允许创建 Issue

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # 步骤 1：检出 zh-CN 分支
      # 后续所有操作都基于此分支进行
      # -------------------------------------------------------
      - name: 检出 zh-CN 分支
        uses: actions/checkout@v5
        with:
          fetch-depth: 0       # 获取完整历史，确保 merge 操作正常
          ref: zh-CN
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # 步骤 2：配置 Git 用户信息
      # -------------------------------------------------------
      - name: 配置 Git 用户信息
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      # -------------------------------------------------------
      # 步骤 3：将 main 合并到 zh-CN
      # 策略说明：
      #   --strategy-option=theirs 表示冲突时以 main 内容为准，
      #   适合上游代码更新的场景（翻译内容不与代码逻辑冲突）
      # -------------------------------------------------------
      - name: 将 main 最新内容合并到 zh-CN
        run: |
          # 拉取 main 分支最新内容
          git fetch origin main

          # 合并 main，冲突时以 main（上游）内容为准
          git merge origin/main --no-edit --strategy-option=theirs || true

      # -------------------------------------------------------
      # 步骤 4：强制还原 .github 目录为 zh-CN 自己的版本
      # 原因：合并时 .github 目录可能被 main（上游）覆盖，
      #       导致 workflow 文件丢失，此步骤确保其不受影响
      # -------------------------------------------------------
      - name: 保护 .github 目录不被覆盖
        run: |
          # 强制将 .github 目录还原为 zh-CN 分支 HEAD 的版本
          git checkout HEAD -- .github/
          echo "✅ .github 目录已还原为 zh-CN 版本"

      # -------------------------------------------------------
      # 步骤 5：推送合并结果到 zh-CN 分支
      # -------------------------------------------------------
      - name: 推送更新到 zh-CN 分支
        run: |
          git push origin zh-CN
          echo "✅ zh-CN 分支已更新完成"

      # -------------------------------------------------------
      # 步骤 6：合并失败时自动创建 Issue 通知
      # 仅在前面任意步骤失败时触发
      # -------------------------------------------------------
      - name: 合并失败时创建 Issue 通知
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "⚠️ zh-CN 分支合并失败，需要手动处理",
              body:
                "自动将 main 合并到 zh-CN 时发生错误。\n\n" +
                "👉 可能原因：\n" +
                "- 翻译文件与上游更新存在严重冲突\n" +
                "- .github 目录还原失败\n" +
                "- 推送权限不足\n\n" +
                "📋 请手动执行以下步骤解决：\n" +
                "```bash\n" +
                "git checkout zh-CN\n" +
                "git fetch origin main\n" +
                "git merge origin/main\n" +
                "# 手动解决冲突后\n" +
                "git push origin zh-CN\n" +
                "```\n\n" +
                "📌 查看详细日志：" +
                context.serverUrl + "/" +
                context.repo.owner + "/" +
                context.repo.repo +
                "/actions/runs/" + context.runId
            });
