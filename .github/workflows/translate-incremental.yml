name: Translate Incremental (Auto)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_files:
        description: 'Comma-separated files to translate (leave empty to auto-detect changed files)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zh-CN
        uses: actions/checkout@v4
        with:
          ref: zh-CN
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install openai

      - name: Detect changed .svelte files
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.target_files }}" ]; then
            echo "${{ github.event.inputs.target_files }}" | tr ',' '\n' > /tmp/changed_files.txt
            echo "Manual target files:"
            cat /tmp/changed_files.txt
          else
            git fetch origin main
            MERGE_BASE=$(git merge-base HEAD origin/main)
            git diff --name-only "$MERGE_BASE" origin/main -- 'src/**/*.svelte' > /tmp/changed_files.txt
            if [ ! -s /tmp/changed_files.txt ]; then
              echo "No changed .svelte files detected, skipping."
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Changed files:"
            cat /tmp/changed_files.txt
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Write translate script
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          python3 -c "import base64; open('/tmp/translate_inc.py','w').write(base64.b64decode('').decode())"
          echo "Script written."

      - name: Run translate script
        if: steps.detect.outputs.has_changes == 'true'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python3 /tmp/translate_inc.py

      - name: Commit results
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [i18n]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            FILES=$(git diff --cached --name-only | tr '\n' ' ')
            git commit -m "i18n: incremental translate [bot] ${FILES}"
            git push origin zh-CN
            echo "Done."
          fi
