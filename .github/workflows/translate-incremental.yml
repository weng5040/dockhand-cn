# ============================================================
# Workflow: 增量自动翻译
# 功能: main 分支同步上游后，自动翻译变动的 .svelte 文件
# 引擎: OpenAI 兼容接口
#
# 需要在仓库 Secrets 中添加：
#   AI_API_KEY / AI_BASE_URL / AI_MODEL
# ============================================================

name: 增量自动翻译

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_files:
        description: '手动指定要翻译的文件（逗号分隔，留空则自动检测变动文件）'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 zh-CN 分支
        uses: actions/checkout@v5
        with:
          ref: zh-CN
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Python 依赖
        run: pip install openai

      - name: 检测变动的 .svelte 文件
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.target_files }}" ]; then
            echo "${{ github.event.inputs.target_files }}" | tr ',' '\n' > /tmp/changed_files.txt
            echo "手动指定文件："
            cat /tmp/changed_files.txt
          else
            git fetch origin main
            MERGE_BASE=$(git merge-base HEAD origin/main)
            git diff --name-only $MERGE_BASE origin/main -- 'src/**/*.svelte' > /tmp/changed_files.txt

            if [ ! -s /tmp/changed_files.txt ]; then
              echo "没有检测到变动的 .svelte 文件，跳过翻译"
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "检测到变动文件："
            cat /tmp/changed_files.txt
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: 执行增量翻译
        if: steps.detect.outputs.has_changes == 'true'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          cat << 'PYEOF' > /tmp/translate_incremental.py
          import os, re, sys
          from openai import OpenAI

          api_key  = os.environ['AI_API_KEY']
          base_url = os.environ['AI_BASE_URL'].rstrip('/') + '/v1'
          model    = os.environ['AI_MODEL']

          client = OpenAI(api_key=api_key, base_url=base_url)

          SYSTEM_PROMPT = """你是一个专业的 Docker 管理面板汉化专家。
          任务：将 Svelte 组件模板中的英文界面文本翻译成中文。
          规则：
          1. 只翻译可见的 UI 文本（按钮、标签、标题、提示语等）
          2. 保留所有 HTML 标签、Svelte 语法（{#if} {#each} {@render} 等）、变量插值 {variable} 原封不动
          3. 技术术语参考：Container→容器、Stack→应用栈、Volume→数据卷、Network→网络、Image→镜像、Registry→镜像仓库、Dashboard→仪表盘、Environment→环境、Schedule→定时任务、Audit→审计、Terminal→终端
          4. 直接返回翻译后的完整文件内容，不要加任何解释或代码块标记"""

          with open('/tmp/changed_files.txt') as f:
              target_files = [
                  l.strip() for l in f
                  if l.strip().endswith('.svelte') and 'components/ui' not in l
              ]

          print(f'待翻译文件数：{len(target_files)}')
          EN_TEXT_RE = re.compile(r'>\s*[A-Z][a-zA-Z\s]{3,}[a-zA-Z]\s*[<{]')
          translated_count = 0

          for filepath in target_files:
              if not os.path.exists(filepath):
                  print(f'  ⚠️  文件不存在，跳过：{filepath}')
                  continue

              with open(filepath, encoding='utf-8') as f:
                  content = f.read()

              if not EN_TEXT_RE.search(content):
                  print(f'  ✓ 无英文文本，跳过：{filepath}')
                  continue

              print(f'  → 翻译：{filepath}')
              try:
                  resp = client.chat.completions.create(
                      model=model,
                      messages=[
                          {'role': 'system', 'content': SYSTEM_PROMPT},
                          {'role': 'user', 'content': f'请翻译以下 Svelte 文件：\n\n{content}'}
                      ],
                      temperature=0.1,
                  )
                  translated = resp.choices[0].message.content.strip()
                  translated = re.sub(r'^```[\w]*\n?', '', translated)
                  translated = re.sub(r'\n?```$', '', translated)

                  if translated and translated != content:
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(translated)
                      translated_count += 1
                      print(f'     ✅ 完成')
                  else:
                      print(f'     ⚠️  内容未变化')

              except Exception as e:
                  print(f'     ❌ 失败：{e}')

          print(f'\n增量翻译完成，共翻译 {translated_count} 个文件')
          PYEOF
          python3 /tmp/translate_incremental.py

      - name: 提交翻译结果
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [AI 翻译]"
          git add -A
          if git diff --cached --quiet; then
            echo "无文件变更"
          else
            FILES=$(git diff --cached --name-only | tr '\n' ' ')
            git commit -m "i18n: AI 增量汉化 [自动] ${FILES}"
            git push origin zh-CN
            echo "✅ 已提交"
          fi
