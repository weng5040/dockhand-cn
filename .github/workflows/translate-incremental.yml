name: Translate Incremental (Auto)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_files:
        description: 'Comma-separated files to translate (leave empty to auto-detect changed files)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zh-CN
        uses: actions/checkout@v4
        with:
          ref: zh-CN
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install openai

      - name: Detect changed .svelte files
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.target_files }}" ]; then
            echo "${{ github.event.inputs.target_files }}" | tr ',' '\n' > /tmp/changed_files.txt
            echo "Manual target files:"
            cat /tmp/changed_files.txt
          else
            git fetch origin main
            MERGE_BASE=$(git merge-base HEAD origin/main)
            git diff --name-only "$MERGE_BASE" origin/main -- 'src/**/*.svelte' > /tmp/changed_files.txt
            if [ ! -s /tmp/changed_files.txt ]; then
              echo "No changed .svelte files detected, skipping."
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Changed files:"
            cat /tmp/changed_files.txt
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Write translate script
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          python3 - <<'PYEOF'
          import os
          script = r"""
          import os, re, sys
          from openai import OpenAI

          api_key  = os.environ.get('AI_API_KEY', '')
          base_url = os.environ.get('AI_BASE_URL', '').rstrip('/') + '/v1'
          model    = os.environ.get('AI_MODEL', '')

          if not api_key:
              print('ERROR: AI_API_KEY is empty')
              sys.exit(1)

          client = OpenAI(api_key=api_key, base_url=base_url)

          SYSTEM_PROMPT = (
              'You are a Docker management panel localization expert. '
              'Translate English UI text in Svelte files to Simplified Chinese. '
              'Rules: '
              '1. Only translate visible UI text (buttons, labels, titles, placeholders). '
              '2. Keep ALL HTML tags, Svelte syntax ({#if}{#each}{@render} etc), and {variable} interpolations unchanged. '
              '3. Terms: Container->\u5bb9\u5668, Stack->\u5e94\u7528\u6808, Volume->\u6570\u636e\u5377, Network->\u7f51\u7edc, '
              'Image->\u955c\u50cf, Registry->\u955c\u50cf\u4ed3\u5e93, Dashboard->\u4eea\u8868\u76d8, Environment->\u73af\u5883, '
              'Schedule->\u5b9a\u65f6\u4efb\u52a1, Audit->\u5ba1\u8ba1, Terminal->\u7ec8\u7aef, Deploy->\u90e8\u7f72. '
              '4. Return ONLY the translated file content. No explanations. No markdown fences.'
          )

          with open('/tmp/changed_files.txt') as f:
              targets = [l.strip() for l in f if l.strip().endswith('.svelte') and 'components/ui' not in l]

          print(f'Files to translate: {len(targets)}')
          EN_TEXT_RE = re.compile(r'>\s*[A-Z][a-zA-Z ]{3,}[a-zA-Z]\s*[<{]')
          count = 0

          for filepath in targets:
              if not os.path.exists(filepath):
                  print(f'  missing: {filepath}')
                  continue
              with open(filepath, encoding='utf-8') as f:
                  content = f.read()
              if not EN_TEXT_RE.search(content):
                  print(f'  skip (no EN text): {filepath}')
                  continue
              print(f'  -> {filepath}')
              try:
                  resp = client.chat.completions.create(
                      model=model,
                      messages=[
                          {'role': 'system', 'content': SYSTEM_PROMPT},
                          {'role': 'user', 'content': 'Translate this Svelte file:\n\n' + content}
                      ],
                      temperature=0.1,
                  )
                  out = resp.choices[0].message.content.strip()
                  out = re.sub(r'^```[\w]*\n?', '', out)
                  out = re.sub(r'\n?```$', '', out)
                  if out and out != content:
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(out)
                      count += 1
                      print('     OK')
                  else:
                      print('     no change')
              except Exception as e:
                  print(f'     FAIL: {e}')

          print(f'Done. Translated {count} files.')
          """
          import textwrap
          script = textwrap.dedent(script)
          with open('/tmp/translate_inc.py', 'w') as f:
              f.write(script)
          print('Script written.')
          PYEOF

      - name: Run translate script
        if: steps.detect.outputs.has_changes == 'true'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python3 /tmp/translate_inc.py

      - name: Commit results
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [i18n]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            FILES=$(git diff --cached --name-only | tr '\n' ' ')
            git commit -m "i18n: incremental translate [bot] ${FILES}"
            git push origin zh-CN
            echo "Done."
          fi
