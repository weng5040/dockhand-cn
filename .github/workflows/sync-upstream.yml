# ============================================================
# Workflow 名称：Sync Upstream (Release)
# 功能说明：
#   定期检查上游仓库（Finsys/dockhand）是否发布了新的 Release，
#   若有新版本则自动将上游 main 分支同步到本仓库的 main 分支。
#   同步策略为强制覆盖（force push），main 分支仅作为上游镜像使用，
#   不在此分支上做任何自定义修改。
#
# 触发方式：
#   - 定时：每 4 小时自动检查一次（UTC 时间）
#   - 手动：可在 GitHub Actions 页面手动触发
#
# 注意事项：
#   - 本 workflow 文件存放在 zh-CN 分支，不会被上游覆盖
#   - main 分支会被强制重置为上游内容，请勿在 main 分支上做修改
#   - 同步记录保存在 .github/LAST_SYNCED_RELEASE 文件中
# ============================================================

name: Sync Upstream (Release)

on:
  # 每 4 小时运行一次（UTC 时间：0、4、8、12、16、20 点）
  schedule:
    - cron: '0 */4 * * *'
  # 允许在 GitHub Actions 页面手动点击触发
  workflow_dispatch:

# 全局权限配置
permissions:
  contents: write  # 允许推送代码到仓库
  issues: write    # 允许在失败时自动创建 Issue

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # 步骤 1：检出本仓库的 main 分支
      # fetch-depth: 0 表示获取完整历史，确保 reset 操作正常
      # -------------------------------------------------------
      - name: 检出 main 分支
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # 步骤 2：配置 Git 用户信息
      # 用于后续 commit 操作的署名
      # -------------------------------------------------------
      - name: 配置 Git 用户信息
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      # -------------------------------------------------------
      # 步骤 3：通过 GitHub API 获取上游最新 Release 信息
      # 输出变量：
      #   steps.upstream.outputs.tag       → Release 的 tag 名称（如 v1.2.3）
      #   steps.upstream.outputs.published → Release 的发布时间
      # -------------------------------------------------------
      - name: 获取上游最新 Release 信息
        id: upstream
        run: |
          API_URL="https://api.github.com/repos/Finsys/dockhand/releases/latest"

          # 调用 GitHub API 获取 Release 数据
          RESPONSE=$(curl -s -H "Accept: application/vnd.github+json" $API_URL)

          # 解析 tag 名称和发布时间
          TAG_NAME=$(echo "$RESPONSE" | jq -r '.tag_name')
          PUBLISHED_AT=$(echo "$RESPONSE" | jq -r '.published_at')

          # 将结果写入 GitHub Actions 输出变量
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED_AT" >> $GITHUB_OUTPUT

          echo "🌐 上游最新 Release：$TAG_NAME（发布于 $PUBLISHED_AT）"

      # -------------------------------------------------------
      # 步骤 4：读取本地记录的上次同步版本
      # 文件路径：.github/LAST_SYNCED_RELEASE
      # 若文件不存在（首次运行），则默认值为 "none"
      # -------------------------------------------------------
      - name: 读取上次同步的 Release 版本
        id: local
        run: |
          if [ -f .github/LAST_SYNCED_RELEASE ]; then
            LAST_TAG=$(cat .github/LAST_SYNCED_RELEASE)
          else
            LAST_TAG="none"
          fi

          echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "📦 上次同步版本：$LAST_TAG"

      # -------------------------------------------------------
      # 步骤 5：比较版本号，判断是否需要执行同步
      # 若上游版本与本地记录不一致，则标记 sync=true
      # -------------------------------------------------------
      - name: 判断是否需要同步
        id: decide
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.local.outputs.tag }}" ]; then
            echo "sync=true" >> $GITHUB_OUTPUT
            echo "🚀 检测到新版本，准备同步..."
          else
            echo "sync=false" >> $GITHUB_OUTPUT
            echo "✅ 已是最新版本，无需同步。"
          fi

      # -------------------------------------------------------
      # 步骤 6：执行同步（仅当检测到新 Release 时才运行）
      # 操作流程：
      #   1. 添加上游仓库为 remote
      #   2. fetch 上游最新代码
      #   3. 强制将 main 重置为上游 main（覆盖本地 main）
      #   4. 在 reset 之后写入版本记录文件（避免被覆盖）
      #   5. 提交版本记录并强制推送到 origin main
      # -------------------------------------------------------
      - name: 同步上游代码到 main 分支
        if: steps.decide.outputs.sync == 'true'
        run: |
          # 添加上游仓库地址
          git remote add upstream https://github.com/Finsys/dockhand.git

          # 拉取上游所有分支和 tag
          git fetch upstream

          # 强制将本地 main 重置为上游 main（丢弃本地 main 的所有变更）
          git reset --hard upstream/main

          # 在 reset 之后写入版本记录，确保不被上游内容覆盖
          mkdir -p .github
          echo "${{ steps.upstream.outputs.tag }}" > .github/LAST_SYNCED_RELEASE

          # 提交版本记录文件（若无变化则跳过）
          git add .github/LAST_SYNCED_RELEASE
          git commit -m "chore: sync upstream release ${{ steps.upstream.outputs.tag }}" || true

          # 强制推送到本仓库的 main 分支
          git push origin main --force

          echo "✅ 同步完成：${{ steps.upstream.outputs.tag }}"

      # -------------------------------------------------------
      # 步骤 7：同步失败时自动创建 Issue 通知
      # 仅在前面任意步骤失败时触发
      # -------------------------------------------------------
      - name: 同步失败时创建 Issue 通知
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Upstream 同步失败",
              body:
                "GitHub Actions 在执行 upstream 同步时发生错误。\n\n" +
                "👉 请检查以下可能原因：\n" +
                "- upstream 仓库（Finsys/dockhand）是否可正常访问\n" +
                "- GITHUB_TOKEN 权限是否包含 contents: write\n" +
                "- GitHub API 是否触发限流（rate limit）\n" +
                "- 网络连接是否正常\n\n" +
                "📋 查看详细日志：" +
                context.serverUrl + "/" +
                context.repo.owner + "/" +
                context.repo.repo +
                "/actions/runs/" + context.runId
            });
