# ============================================================
# Workflow 名称：Sync Upstream (Release)
# 功能说明：
#   定期检查上游仓库（Finsys/dockhand）是否发布了新的 Release，
#   若有新版本则自动将上游 main 分支同步到本仓库的 main 分支。
#   同步策略为强制覆盖（force push），main 分支仅作为上游镜像使用。
#
# 触发方式：
#   - 定时：每 4 小时自动检查一次（UTC 时间）
#   - 手动：可在 GitHub Actions 页面手动触发
#
# 注意事项：
#   - 本 workflow 文件存放在 zh-CN 分支，不会被上游覆盖
#   - main 分支会被强制重置为上游内容，请勿在 main 分支上手动做修改
#   - 同步后自动写回 .github/workflows/merge-to-zh-cn.yml，防止被覆盖
#   - 同步记录保存在 .github/LAST_SYNCED_RELEASE 文件中
# ============================================================

name: 同步上游仓库（Finsys/dockhand） > main

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出 main 分支
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git 用户信息
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: 获取上游最新 Release 信息
        id: upstream
        run: |
          API_URL="https://api.github.com/repos/Finsys/dockhand/releases/latest"
          RESPONSE=$(curl -s -H "Accept: application/vnd.github+json" $API_URL)
          TAG_NAME=$(echo "$RESPONSE" | jq -r '.tag_name')
          PUBLISHED_AT=$(echo "$RESPONSE" | jq -r '.published_at')
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED_AT" >> $GITHUB_OUTPUT
          echo "🌐 上游最新 Release：$TAG_NAME（发布于 $PUBLISHED_AT）"

      - name: 读取上次同步的 Release 版本
        id: local
        run: |
          if [ -f .github/LAST_SYNCED_RELEASE ]; then
            LAST_TAG=$(cat .github/LAST_SYNCED_RELEASE)
          else
            LAST_TAG="none"
          fi
          echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "📦 上次同步版本：$LAST_TAG"

      - name: 判断是否需要同步
        id: decide
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.local.outputs.tag }}" ]; then
            echo "sync=true" >> $GITHUB_OUTPUT
            echo "🚀 检测到新版本，准备同步..."
          else
            echo "sync=false" >> $GITHUB_OUTPUT
            echo "✅ 已是最新版本，无需同步。"
          fi

      - name: 同步上游代码到 main 分支
        if: steps.decide.outputs.sync == 'true'
        run: |
          git remote add upstream https://github.com/Finsys/dockhand.git
          git fetch upstream
          git reset --hard upstream/main
          mkdir -p .github/workflows
          echo "${{ steps.upstream.outputs.tag }}" > .github/LAST_SYNCED_RELEASE

          # 用 base64 写入 merge-to-zh-cn.yml，避免 token 被 Actions 展开后泄漏到文件内容
          python3 -c "
import base64
content = '''name: main > zh-CN

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: \u68c0\u51fa zh-CN \u5206\u652f
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: zh-CN
          token: \${{ secrets.GITHUB_TOKEN }}

      - name: \u914d\u7f6e Git \u7528\u6237\u4fe1\u606f
        run: |
          git config user.email \"actions@github.com\"
          git config user.name \"GitHub Actions\"

      - name: \u5c06 main \u6700\u65b0\u5185\u5bb9\u5408\u5e76\u5230 zh-CN
        run: |
          git fetch origin main
          git merge origin/main --no-edit --strategy-option=theirs || true

      - name: \u4fdd\u62a4 .github \u76ee\u5f55\u4e0d\u88ab\u8986\u76d6
        run: |
          git checkout HEAD -- .github/

      - name: \u63a8\u9001\u66f4\u65b0\u5230 zh-CN \u5206\u652f
        run: |
          git push origin zh-CN

      - name: \u5408\u5e76\u5931\u8d25\u65f6\u8f93\u51fa\u9519\u8bef\u4fe1\u606f
        if: failure()
        run: |
          echo \"::error title=zh-CN merge failed::zh-CN \u5206\u652f\u5408\u5e76\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5 Actions \u65e5\u5fd7\"
          exit 1
'''
open('.github/workflows/merge-to-zh-cn.yml', 'w').write(content)
"

          git add .github/LAST_SYNCED_RELEASE .github/workflows/merge-to-zh-cn.yml
          git commit -m "chore: sync upstream release ${{ steps.upstream.outputs.tag }}" || true
          git push origin main --force
          echo "✅ 同步完成：${{ steps.upstream.outputs.tag }}"

      - name: 同步失败时输出错误信息
        if: failure()
        run: |
          echo "::error title=Upstream 同步失败::请检查 Actions 日志，可能原因：upstream 不可访问 / GITHUB_TOKEN 权限不足 / API 限流"
          exit 1
